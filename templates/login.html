<!DOCTYPE html>
<html>
<head>
<title>Login</title>
</head>

<body style="background:#0b1220; color:white; display:flex; justify-content:center; align-items:center; height:100vh;">

<form method="POST" action="/login" style="background:#111827; padding:25px; border-radius:12px; width:320px;">
  <h2>Login</h2>

  <input name="email" placeholder="Email" style="width:100%; padding:10px; margin:8px 0;">
  <input name="password" type="password" placeholder="Password" style="width:100%; padding:10px; margin:8px 0;">

  <button style="width:100%; padding:10px; background:#3b82f6; color:white;">Login</button>

  <p style="margin-top:10px;">
    No account? <a href="/signup">Signup</a>
  </p>
</form>

</body>
</html>

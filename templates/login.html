<!DOCTYPE html>
<html>
<head>
    <title>Login</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body style="background: linear-gradient(135deg,#0f172a,#111827); color:white;">

<div class="container d-flex justify-content-center align-items-center" style="height:100vh;">

    <div class="card p-4" style="width:350px; background:#1f2937; border-radius:15px;">

        <h3 class="text-center mb-3">Login</h3>

        <form method="POST">

            <input class="form-control mb-3" name="email" placeholder="Email">

            <input class="form-control mb-3" type="password" name="password" placeholder="Password">

            <button class="btn btn-primary w-100">Login</button>

        </form>

        <p class="mt-3 text-center">
            New user? <a href="/signup">Signup</a>
        </p>

    </div>

</div>

</body>
</html>

<!DOCTYPE html>
<html>

<head>
    <title>SmartExpense</title>
    

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet"
      href="{{ url_for('static', filename='style.css') }}">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>

<body class="bg-light">

<div class="container mt-5">

    <h1 class="text-center mb-4">
        SmartExpense Tracker
    </h1>

    <div class="card p-4 mb-4 shadow">

        <form action="/add" method="POST">

            <div class="row">

                <div class="col-md-4">
                    <input
                        type="text"
                        name="title"
                        class="form-control"
                        placeholder="Expense title"
                        required>
                </div>

                <div class="col-md-3">
                    <input
                        type="number"
                        name="amount"
                        class="form-control"
                        placeholder="Amount"
                        required>
                </div>

                <div class="col-md-3">

                    <select name="category" class="form-control">

    <option>Food</option>
    <option>Travel</option>
    <option>Shopping</option>
    <option>Bills</option>
    <option>Entertainment</option>
    <option>Health</option>
    <option>Education</option>
    <option>Other</option>

</select>

                </div>

                <div class="col-md-2">
                    <button class="btn btn-primary w-100">
                        Add
                    </button>
                </div>

            </div>

        </form>

    </div>

    <div class="alert alert-success">
        <h4>Total Expense: ₹ {{ total }}</h4>
    </div>

    <div class="card p-4 mb-4 shadow">

        <canvas id="expenseChart"></canvas>

    </div>

    {% for expense in expenses %}

    <div class="card mb-2 shadow-sm">

        <div class="card-body d-flex justify-content-between">

            <div>
                <strong>{{ expense.title }}</strong>
                <br>
                ₹ {{ expense.amount }}
                |
                {{ expense.category }}
<br>
<small>{{ expense.date }}</small>
            </div>

            <a href="/delete/{{ expense.id }}"
               class="btn btn-danger btn-sm">
               Delete
            </a>

        </div>

    </div>

    {% endfor %}

</div>

<script>

const labels = JSON.parse('{{ category_totals.keys() | list | tojson | safe }}');

const values = JSON.parse('{{ category_totals.values() | list | tojson | safe }}');

new Chart(document.getElementById('expenseChart'), {

    type: 'pie',

    data: {
        labels: labels,

        datasets: [{
            data: values
        }]
    }

});

</script>

</body>
</html>

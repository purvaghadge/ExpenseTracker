<!DOCTYPE html>
<html>
<head>
<title>Expense SaaS</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

<style>
body{
    background:#0f172a;
    color:white;
}

.topbar{
    display:flex;
    justify-content:space-between;
    align-items:center;
    padding:15px;
    background:#111827;
}

.card-box{
    background:#111827;
    border-radius:15px;
    padding:15px;
    margin-bottom:10px;
}

button, .btn{
    border-radius:10px;
}

input, select{
    background:#1f2937 !important;
    color:white !important;
    border:none !important;
}

.month{
    cursor:pointer;
    padding:10px;
    background:#1f2937;
    border-radius:10px;
    margin-top:10px;
}

.expense{
    padding:8px;
    border-bottom:1px solid #374151;
    font-size:14px;
}
</style>
</head>

<body>

<div class="topbar">
<div>Hi {{ email }}</div>
<a href="/logout" class="btn btn-danger btn-sm">Logout</a>
</div>

<div class="container mt-3">

<h4>Total: ₹{{ total }}</h4>

<!-- ADD EXPENSE -->
<div class="card-box">

<form id="expenseForm">

<input class="form-control mb-2" name="title" placeholder="Title">

<input class="form-control mb-2" name="amount" placeholder="Amount">

<select class="form-control mb-2" name="category">
<option>Food</option>
<option>Travel</option>
<option>Shopping</option>
<option>Bills</option>
<option>Other</option>
</select>

<button class="btn btn-primary w-100">Add</button>

</form>

</div>

<!-- YEAR → MONTH → EXPENSE -->
{% for year, months in yearly_data.items() %}

<div class="card-box">

<h4>📅 {{ year }}</h4>

{% for month, data in months.items() %}

<div class="month" onclick="toggle('{{year}}{{month}}')">
📆 {{ month }} — ₹{{ data.total }}
</div>

<div id="{{year}}{{month}}" style="display:none">

{% for e in data.expenses %}

<div class="expense">
<b>{{ e.title }}</b> - ₹{{ e.amount }} ({{ e.category }})
</div>

{% endfor %}

</div>

{% endfor %}

</div>

{% endfor %}

</div>

<script>

// AJAX ADD (NO RELOAD)
document.getElementById("expenseForm").addEventListener("submit", async function(e){
e.preventDefault();

let formData = new FormData(this);

let res = await fetch("/add", {
method:"POST",
body:formData
});

let data = await res.json();

if(data.status === "success"){
location.reload();
}
});

// TOGGLE MONTH
function toggle(id){
let el = document.getElementById(id);
el.style.display = el.style.display === "none" ? "block" : "none";
}

</script>

</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Signup</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial, Helvetica, sans-serif;
}

body{
    min-height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    background:linear-gradient(135deg,#111827,#0f172a,#1e293b);
    padding:20px;
}

.container{
    width:100%;
    max-width:400px;
}

.card{
    background:rgba(255,255,255,0.08);
    backdrop-filter:blur(14px);
    border:1px solid rgba(255,255,255,0.1);
    border-radius:24px;
    padding:35px 28px;
    box-shadow:0 10px 40px rgba(0,0,0,0.4);
}

.logo{
    text-align:center;
    color:white;
    font-size:28px;
    font-weight:bold;
    margin-bottom:10px;
}

.subtitle{
    text-align:center;
    color:#cbd5e1;
    margin-bottom:30px;
    font-size:14px;
}

.input-group{
    margin-bottom:18px;
}

.input-group label{
    display:block;
    margin-bottom:8px;
    color:#e2e8f0;
    font-size:14px;
}

.input-group input{
    width:100%;
    padding:14px;
    border:none;
    outline:none;
    border-radius:14px;
    background:#1e293b;
    color:white;
    font-size:15px;
}

.input-group input:focus{
    border:2px solid #3b82f6;
}

button{
    width:100%;
    padding:14px;
    border:none;
    border-radius:14px;
    background:#10b981;
    color:white;
    font-size:16px;
    cursor:pointer;
    transition:0.3s;
    margin-top:10px;
}

button:hover{
    background:#059669;
}

.bottom-text{
    margin-top:22px;
    text-align:center;
    color:#cbd5e1;
    font-size:14px;
}

.bottom-text a{
    color:#60a5fa;
    text-decoration:none;
}

.alert{
    width:100%;
    background:#ef4444;
    color:white;
    padding:12px;
    border-radius:12px;
    margin-bottom:18px;
    text-align:center;
    display:none;
}

.success{
    background:#10b981;
}

@media(max-width:480px){

    .card{
        padding:28px 20px;
    }

    .logo{
        font-size:24px;
    }

}

</style>
</head>

<body>

<div class="container">

<div class="card">

<div class="logo">Create Account</div>
<div class="subtitle">Start managing expenses smartly</div>

{% if error %}
<div class="alert" style="display:block;">
    {{ error }}
</div>
{% endif %}

{% if success %}
<div class="alert success" style="display:block;">
    {{ success }}
</div>
{% endif %}

<form method="POST">

<div class="input-group">
<label>Email</label>
<input type="email" name="email" required>
</div>

<div class="input-group">
<label>Password</label>
<input type="password" name="password" required>
</div>

<button type="submit">Signup</button>

</form>

<div class="bottom-text">
Already have an account?
<a href="/">Login</a>
</div>

</div>

</div>

</body>
</html>

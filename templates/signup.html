<!DOCTYPE html>
<html>
<head>
<title>Signup</title>
</head>

<body style="background:#0b1220; color:white; display:flex; justify-content:center; align-items:center; height:100vh;">

<form method="POST" action="/signup" style="background:#111827; padding:25px; border-radius:12px; width:320px;">
  <h2>Signup</h2>

  <input name="email" placeholder="Email" style="width:100%; padding:10px; margin:8px 0;">
  <input name="password" type="password" placeholder="Password" style="width:100%; padding:10px; margin:8px 0;">

  <button style="width:100%; padding:10px; background:#22c55e; color:white;">Create Account</button>

  <p>
    Already have account? <a href="/login">Login</a>
  </p>
</form>

</body>
</html>

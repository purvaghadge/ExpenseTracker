<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Signup</title>

<style>
body {
  height: 100vh;
  display: flex;
  justify-content: center;
  align-items: center;
  background: #0b1220;
  font-family: Arial;
  overflow: hidden;
}

body::before, body::after {
  content: "";
  position: absolute;
  width: 280px;
  height: 280px;
  border-radius: 50%;
  filter: blur(100px);
  opacity: 0.35;
}

body::before {
  background: #22c55e;
  top: 15%;
  left: 20%;
}

body::after {
  background: #3b82f6;
  bottom: 15%;
  right: 20%;
}

.card {
  width: 360px;
  padding: 28px;
  border-radius: 14px;

  background: rgba(255,255,255,0.06);
  border: 1px solid rgba(255,255,255,0.12);

  backdrop-filter: blur(10px);
}

h2 {
  color: white;
  font-size: 22px;
  margin-bottom: 6px;
}

.subtitle {
  color: #a3b3c7;
  font-size: 13px;
  margin-bottom: 18px;
}

input {
  width: 100%;
  padding: 12px;
  margin: 10px 0;
  border-radius: 10px;
  border: 1px solid rgba(255,255,255,0.15);

  background: rgba(15, 23, 42, 0.6);
  color: white;
}

input::placeholder {
  color: #94a3b8;
}

button {
  width: 100%;
  padding: 12px;
  border-radius: 10px;
  border: none;

  background: linear-gradient(135deg, #22c55e, #3b82f6);
  color: white;
  font-weight: 600;

  cursor: pointer;
}

p {
  text-align: center;
  margin-top: 14px;
  color: #94a3b8;
  font-size: 13px;
}

a {
  color: #60a5fa;
  text-decoration: none;
}
</style>
</head>

<body>

<div class="card">
  <h2>Create Account</h2>
  <div class="subtitle">Start tracking your expenses</div>

  <input type="text" placeholder="Name">
  <input type="email" placeholder="Email">
  <input type="password" placeholder="Password">

  <button>Sign Up</button>

  <p>Already have an account? <a href="login.html">Login</a></p>
</div>

</body>
</html>
